steps:
# ==============================================================================
# PASSO DE DIAGNÓSTICO TEMPORÁRIO
# Este passo tenta verificar a conectividade de rede com o gcr.io.
# ==============================================================================
- name: 'ubuntu'
  id: 'Network Connectivity Check'
  args:
    - 'bash'
    - '-c'
    - |
      echo "--- Iniciando verificação de rede ---"
      apt-get update -y && apt-get install -y dnsutils curl
      echo "--- Verificando DNS para gcr.io ---"
      nslookup gcr.io
      echo "--- Tentando conectar ao gcr.io na porta 443 (HTTPS) ---"
      curl -v https://gcr.io
      echo "--- Verificação de rede concluída ---"

# ==============================================================================
# Pipeline de Build Original
# ==============================================================================

# 1. Build da imagem Docker
- name: 'gcr.io/cloud-builders/docker'
  id: 'Build'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/suaobra-backend-repo/suaobra-backend-service:$COMMIT_SHA'
    - '.'
    - '-f'
    - 'Dockerfile'
  env:
    - 'DOCKER_BUILDKIT=1'

# 2. Push da imagem para o Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'Push'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/suaobra-backend-repo/suaobra-backend-service:$COMMIT_SHA'

# 3. Deploy da nova revisão no Cloud Run
- name: 'gcr.io/google-cloud-builders/gcloud'
  id: 'Deploy'
  args:
    - 'run'
    - 'deploy'
    - 'suaobra-backend-service'
    - '--image'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/suaobra-backend-repo/suaobra-backend-service:$COMMIT_SHA'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'

# Mantém a imagem no registro para referência
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/suaobra-backend-repo/suaobra-backend-service:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'