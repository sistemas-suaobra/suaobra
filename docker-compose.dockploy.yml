# Deploy no Dokploy (Docker Compose)
#
# Modo atual: acesso por IP + porta (sem domínio / sem Traefik).
#   Frontend: http://<IP>:8091
#   Backend:  http://<IP>:8080
#
# Compose path no Dokploy: ./docker-compose.dockploy.yml
#
# Quando tiver domínio, volte labels Traefik e remova ports (ver git history).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
    ports:
      - "8080:8080"
    volumes:
      - ../files/suaobra/data:/app/data
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8091:80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
