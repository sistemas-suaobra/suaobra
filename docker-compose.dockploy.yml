# Deploy no Dokploy (Docker Compose)
#
# Compose path no Dokploy: ./docker-compose.dockploy.yml
#
# Variaveis obrigatorias no painel Dokploy (Environment):
#   APP_DOMAIN=app.suaobra.com.br
#   API_DOMAIN=api.suaobra.com.br
#   ENV=production
#   GEMINI_API_KEY, MESSENGER_TOKEN, MESSENGER_BASE_URL
#   WHATSMEOW_URL, WHATSMEOW_APIKEY, WHATSMEOW_WEBHOOK_BASE
#
# Roteamento:
#   - API: labels Traefik no servico backend (abaixo).
#   - App: Dokploy > Domains > app.suaobra.com.br, Container Port = 8091.
#
# NAO coloque labels Traefik no frontend E dominio na aba Domains ao mesmo tempo —
# rotas duplicadas para o mesmo host geram 502 (compose :80 vs Dokploy :8091).
# Caddy escuta na porta 8091 dentro do container; host 8091:8091 e debug por IP.
#
# Dados: core.db em ../files/suaobra/data/core.db (volume abaixo).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      DEBUG: ${DEBUG:-LOW}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MESSENGER_TOKEN: ${MESSENGER_TOKEN:-}
      MESSENGER_BASE_URL: ${MESSENGER_BASE_URL:-}
      WHATSMEOW_URL: ${WHATSMEOW_URL:-}
      WHATSMEOW_APIKEY: ${WHATSMEOW_APIKEY:-}
      WHATSMEOW_WEBHOOK_BASE: ${WHATSMEOW_WEBHOOK_BASE:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "8080:8080"
    volumes:
      - ../files/suaobra/data:/app/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.rule=Host(`api.suaobra.com.br`)
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.tls.certResolver=letsencrypt
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.service=${TRAEFIK_ROUTER_PREFIX:-suaobra}-api
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api-http.rule=Host(`api.suaobra.com.br`)
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api-http.entrypoints=web
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api-http.service=${TRAEFIK_ROUTER_PREFIX:-suaobra}-api
      - traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.loadbalancer.server.port=8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8091:8091"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
