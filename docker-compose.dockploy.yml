# Deploy no Dokploy (Docker Compose)
#
# Modo atual: acesso por IP + porta (sem domínio / sem Traefik).
#   Frontend: http://<IP>:8091
#   Backend:  http://<IP>:8080
#
# Compose path no Dokploy: ./docker-compose.dockploy.yml
#
# Quando tiver domínio, volte labels Traefik e remova ports (ver git history).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      DEBUG: ${DEBUG:-LOW}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MESSENGER_TOKEN: ${MESSENGER_TOKEN:-}
      MESSENGER_BASE_URL: ${MESSENGER_BASE_URL:-}
      WHATSMEOW_URL: ${WHATSMEOW_URL:-}
      WHATSMEOW_APIKEY: ${WHATSMEOW_APIKEY:-}
      WHATSMEOW_WEBHOOK_BASE: ${WHATSMEOW_WEBHOOK_BASE:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "8080:8080"
    volumes:
      - ../files/suaobra/data:/app/data
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8091:80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
