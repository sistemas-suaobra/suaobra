# Deploy no Dokploy (Docker Compose)
#
# Compose path no Dokploy: ./docker-compose.dockploy.yml
#
# Variaveis obrigatorias no painel Dokploy (Environment):
#   APP_DOMAIN=app.suaobra.com.br
#   API_DOMAIN=api.suaobra.com.br
#   ENV=production
#   GEMINI_API_KEY, MESSENGER_TOKEN, MESSENGER_BASE_URL
#   WHATSMEOW_URL, WHATSMEOW_APIKEY, WHATSMEOW_WEBHOOK_BASE
#
# Roteamento: Cloudflare -> Traefik (labels abaixo) -> container.
# Caddy escuta nas portas 80 e 8091 DENTRO do container (80 = Traefik; 8091 = legado Dokploy).
# Mapeamento 8091:80 = acesso direto por IP (http://<IP>:8091).
#
# IMPORTANTE (Dokploy > Domains): NAO cadastre app.suaobra.com.br na aba Domains
# do painel se estas labels Traefik estiverem ativas — rotas duplicadas geram 502.
# O Traefik usa loadbalancer.server.port=80.
#
# Dados: core.db em ../files/suaobra/data/core.db (volume abaixo).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      DEBUG: ${DEBUG:-LOW}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MESSENGER_TOKEN: ${MESSENGER_TOKEN:-}
      MESSENGER_BASE_URL: ${MESSENGER_BASE_URL:-}
      WHATSMEOW_URL: ${WHATSMEOW_URL:-}
      WHATSMEOW_APIKEY: ${WHATSMEOW_APIKEY:-}
      WHATSMEOW_WEBHOOK_BASE: ${WHATSMEOW_WEBHOOK_BASE:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "8080:8080"
    volumes:
      - ../files/suaobra/data:/app/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.rule=Host(`api.suaobra.com.br`)
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.tls.certResolver=letsencrypt
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.service=${TRAEFIK_ROUTER_PREFIX:-suaobra}-api
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api-http.rule=Host(`api.suaobra.com.br`)
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api-http.entrypoints=web
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api-http.service=${TRAEFIK_ROUTER_PREFIX:-suaobra}-api
      - traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-suaobra}-api.loadbalancer.server.port=8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8091:80"
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.rule=Host(`app.suaobra.com.br`)
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.tls.certResolver=letsencrypt
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.service=${TRAEFIK_ROUTER_PREFIX:-suaobra}-app
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app-http.rule=Host(`app.suaobra.com.br`)
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app-http.entrypoints=web
      - traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app-http.service=${TRAEFIK_ROUTER_PREFIX:-suaobra}-app
      - traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.loadbalancer.server.port=80
      - traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.loadbalancer.healthcheck.path=/
      - traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-suaobra}-app.loadbalancer.healthcheck.interval=30s

networks:
  dokploy-network:
    external: true
