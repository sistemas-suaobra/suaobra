version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suaobra-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data/backend:/app/data
    networks:
      - suaobra-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: suaobra-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - suaobra-net

  caddy:
    image: caddy:2-alpine
    container_name: suaobra-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - suaobra-net

networks:
  suaobra-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  backend_data:
