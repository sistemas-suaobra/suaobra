steps:
- name: 'gcr.io/cloud-builders/npm'
  args: ['install']
  dir: 'frontend'
- name: 'gcr.io/cloud-builders/npm'
  args: ['run', 'build']
  dir: 'frontend'
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['-m', 'rsync', '-d', '-c', '-r', 'dist', 'gs://app-suaobra-com-br-frontend-assets']
  dir: 'frontend'
options:
  logging: CLOUD_LOGGING_ONLY