version: '3.8'

services:
  node-scraper-rrt:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security options for Puppeteer in container
    security_opt:
      - seccomp:unconfined
    # Shared memory size for Chromium
    shm_size: 2gb
    # Memory limit
    mem_limit: 2g
    # CPU limit
    cpus: '1.0'
